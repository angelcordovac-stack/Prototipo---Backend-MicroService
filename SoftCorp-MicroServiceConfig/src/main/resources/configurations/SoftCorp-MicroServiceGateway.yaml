server:
  port: ${PORT:8080}

spring:
  cloud:
    gateway:
      server:
        webflux:
          # CORS centralizado en el gateway (unica puerta de entrada del frontend).
          # CORS_ALLOWED_ORIGINS admite lista separada por comas; por defecto "*".
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins: "${CORS_ALLOWED_ORIGINS:*}"
                allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
                allowed-headers: "*"
          # Rutas: se conservan EXACTAMENTE los prefijos del monolito (frontend intacto).
          # En Render cada servicio tiene URL publica propia -> se enruta por URL absoluta
          # (no 'lb://'), configurable por variable de entorno.
          routes:
            - id: identidad-usuarios
              uri: ${IDENTIDAD_URI:http://localhost:8081}
              predicates:
                - Path=/usuarios/**
            - id: identidad-mantenimiento
              uri: ${IDENTIDAD_URI:http://localhost:8081}
              predicates:
                - Path=/mantenimiento/**
            - id: identidad-tecnicos
              uri: ${IDENTIDAD_URI:http://localhost:8081}
              predicates:
                - Path=/api/tecnicos/**
            - id: identidad-dev
              uri: ${IDENTIDAD_URI:http://localhost:8081}
              predicates:
                - Path=/dev/**
            - id: incidencias
              uri: ${INCIDENCIAS_URI:http://localhost:8082}
              predicates:
                - Path=/api/incidencias/**
            - id: equipos
              uri: ${EQUIPOS_URI:http://localhost:8083}
              predicates:
                - Path=/api/equipos/**

# Eureka desactivado por defecto (Render no lo usa). Local: EUREKA_ENABLED=true.
eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    register-with-eureka: ${EUREKA_ENABLED:false}
    fetch-registry: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
