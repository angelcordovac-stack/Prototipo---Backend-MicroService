apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: diccionario-service
  name: diccionario-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: diccionario-service
  template:
    metadata:
      labels:
        io.kompose.service: diccionario-service
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 postgres-diccionario 5432 && nc -z -w 2 usuarios-service 8081; do
                echo "Waiting for config-server, eureka-server, postgres-diccionario, usuarios-service..."
                sleep 2
              done
      containers:
        - env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-diccionario:5432/diccionarioFallasDb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "postgres"
            - name: TOKEN_JWT_SECRET
              value: "rlwAehxP/vA1hLRRouPqSaT1/+mo1RCWQ++pd/JjeWg="
          image: softcorp-diccionario-service
          imagePullPolicy: IfNotPresent
          name: diccionario-service
          ports:
            - containerPort: 8084
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
