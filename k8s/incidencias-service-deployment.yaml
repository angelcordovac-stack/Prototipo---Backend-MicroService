apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: incidencias-service
  name: incidencias-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: incidencias-service
  template:
    metadata:
      labels:
        io.kompose.service: incidencias-service
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 sqlserver-incidencias 1433 && nc -z -w 2 usuarios-service 8081 && nc -z -w 2 equipos-service 8082; do
                echo "Waiting for config-server, eureka-server, sqlserver-incidencias, usuarios-service, equipos-service..."
                sleep 2
              done
      containers:
        - env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:sqlserver://sqlserver-incidencias:1433;databaseName=incidenciasDb;encrypt=false;trustServerCertificate=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "sa"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "SoftCorp2024!"
            - name: TOKEN_JWT_SECRET
              value: "rlwAehxP/vA1hLRRouPqSaT1/+mo1RCWQ++pd/JjeWg="
          image: softcorp-incidencias-service
          imagePullPolicy: IfNotPresent
          name: incidencias-service
          ports:
            - containerPort: 8083
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
