apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: config-server
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: config-server
  template:
    metadata:
      labels:
        io.kompose.service: config-server
    spec:
      containers:
        - env:

          image: softcorp-config-server
          imagePullPolicy: IfNotPresent
          name: config-server
          ports:
            - containerPort: 8888
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: 8888
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8888
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8888
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
