apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: equipos-service
  name: equipos-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: equipos-service
  template:
    metadata:
      labels:
        io.kompose.service: equipos-service
    spec:
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 config-server 8888 && nc -z -w 2 eureka-server 8761 && nc -z -w 2 mysql-equipos 3306; do
                echo "Waiting for config-server, eureka-server, mysql-equipos..."
                sleep 2
              done
      containers:
        - env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-equipos:3306/equiposDb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"
            - name: TOKEN_JWT_SECRET
              value: "rlwAehxP/vA1hLRRouPqSaT1/+mo1RCWQ++pd/JjeWg="
          image: softcorp-equipos-service
          imagePullPolicy: IfNotPresent
          name: equipos-service
          ports:
            - containerPort: 8082
              protocol: TCP
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
